name: Build OpenWrt package

on:
  workflow_dispatch:

env:
  OPENWRT_VERSION: 23.05.5
  OPENWRT_TARGET: x86/64
  PACKAGE_NAME: luci-app-template

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86-64
            target: x86/64

    steps:
      - name: Checkout package
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3-distutils \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            xz-utils

      - name: Download OpenWrt SDK
        shell: bash
        run: |
          set -euo pipefail

          base_url="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${{ matrix.target }}"
          sdk_file="$({ wget -qO- "${base_url}/" | grep -oE 'openwrt-sdk-[^"]+Linux-x86_64\.tar\.xz' | head -n 1; } || true)"

          if [ -z "${sdk_file}" ]; then
            echo "OpenWrt SDK archive not found at ${base_url}" >&2
            exit 1
          fi

          wget -q "${base_url}/${sdk_file}"
          tar -xf "${sdk_file}"
          sdk_dir="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' -print -quit)"
          mv "${sdk_dir}" openwrt-sdk

      - name: Install LuCI feed
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update luci
          ./scripts/feeds install luci-base

      - name: Copy package into SDK
        run: |
          mkdir -p openwrt-sdk/package/${PACKAGE_NAME}
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='openwrt-sdk' \
            --exclude='openwrt-sdk-*' \
            --exclude='artifacts' \
            ./ openwrt-sdk/package/${PACKAGE_NAME}/

      - name: Build package
        working-directory: openwrt-sdk
        run: |
          make defconfig
          make package/${PACKAGE_NAME}/{clean,compile} V=s

      - name: Collect package artifact
        run: |
          mkdir -p artifacts
          find openwrt-sdk/bin/packages -type f -name "${PACKAGE_NAME}_*.ipk" -exec cp -v {} artifacts/ \;

      - name: Upload ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.arch }}-${{ env.OPENWRT_VERSION }}
          path: artifacts/${{ env.PACKAGE_NAME }}_*.ipk
          if-no-files-found: error
